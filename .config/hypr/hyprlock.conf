59;9u# .gilded theme created by v81d

background {
    path = screenshot
    blur_size = 20
    blur_passes = 5
    brightness = 0.7
}

label {
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    
    color = rgba(224, 212, 184, 0.6)
    font_size = 20
    font_family = Adwaita Sans Bold

    position = 0, 240

    shadow_passes = 4
    shadow_size = 8
    shadow_boost = 0.4
}

label {
    text = cmd[update:1000] echo "$TIME"

    color = rgba(224, 212, 184, 0.6)
    font_size = 100
    font_family = Adwaita Sans Bold

    position = 0, 150

    shadow_passes = 4
    shadow_size = 8
    shadow_boost = 0.4
}

image {
    path = ~/.config/hypr/profile.jpg
    
    size = 175
    border_size = 0

    position = 0, -40
    
    shadow_passes = 4
    shadow_size = 8
    shadow_boost = 0.4
}

input-field {
    size = 400, 60
    outline_thickness = 0

    dots_size = 0.2
    dots_center = true

    inner_color = rgba(224, 212, 184, 0.1)
    font_color = rgba(224, 212, 184, 0.6)
    check_color = rgba(200, 170, 100, 0.3)
    fail_color = rgba(220, 80, 80, 0.3)
    capslock_color = rgba(224, 212, 184, 0.1)
    numlock_color = rgba(224, 212, 184, 0.1)
    bothlock_color = rgba(224, 212, 184, 0.1)

    fade_on_empty = false

    placeholder_text =    Input password
    fail_text =    $FAIL - $ATTEMPTS attempt(s) remaining

    font_family = Adwaita Sans

    position = 0, -210

    shadow_passes = 4
    shadow_size = 8
    shadow_boost = 0.4
}
