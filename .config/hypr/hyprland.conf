#########################
# HYPRLAND CONFIG FILE  #
#########################

#########################
#       MONITORS        #
#########################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor = eDP-1, preferred, auto, 1.0

#########################
#      MY PROGRAMS      #
#########################

# See https://wiki.hyprland.org/Configuring/Keywords/
$terminal = kitty
$fileManager = nautilus
$menu = rofi -show drun -normal-window -show-icons &
$power = bash ~/.config/rofi/scripts/power.sh &
$charge = bash ~/.config/rofi/scripts/charge.sh &
$wifi = bash ~/.config/rofi/scripts/wifi.sh &

#########################
#       AUTOSTART       #
#########################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
exec-once = hyprpaper &
exec-once = waybar &
exec-once = dunst &
exec-once = lxqt-policykit-agent &
exec-once = zen-browser &

#########################
# ENVIRONMENT VARIABLES #
#########################

# See https://wiki.hyprland.org/Configuring/Environment-variables/
env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24

#########################
#    LOOK AND FEEL      #
#########################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 8
    gaps_out = 20

    border_size = 4

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(ffdeb0ff) rgba(b37f35ff) 90deg
    col.inactive_border = rgba(ffdeb026)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 24
        render_power = 4
        color = rgba(1a1a1a40)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 10
        passes = 3

        new_optimizations = true

        vibrancy = 0.5
        vibrancy_darkness = 0.8
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1.0
    bezier = quick, 0.15, 0, 0.1, 1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 50%
    animation = windowsOut, 1, 1.49, linear, popin 50%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 4.8, easeInOutCubic, slidefade
    animation = workspacesIn, 1, 4.8, easeInOutCubic, slidefade
    animation = workspacesOut, 1, 4.8, easeInOutCubic, slidefade
}

# Reference: https://wiki.hyprland.org/Configuring/Workspace-Rules/
# Layer rules
layerrule = blur, waybar
layerrule = ignorezero, waybar
layerrule = blur, notifications
layerrule = ignorezero, notifications

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true
    preserve_split = true
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}

#########################
#        INPUT          #
#########################

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us, ru
    kb_variant = , phonetic
    kb_model =
    kb_options = grp:win_space_toggle
    kb_rules =

    follow_mouse = 2

    sensitivity = 0
    accel_profile = adaptive

    touchpad {
        natural_scroll = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    workspace_swipe = true
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
	name = usb-gaming-mouse
    accel_profile = flat
}

device {
	name = usb-gaming-mouse-1
    accel_profile = flat
}

#########################
#     KEYBINDINGS       #
#########################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER

# See https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod+SHIFT, BACKSPACE, exec, $power
bind = $mainMod+SHIFT, C, exec, $charge
bind = $mainMod+SHIFT, W, exec, $wifi
bind = $mainMod, TAB, exec, $menu
bind = $mainMod+SHIFT, B, exec, bash -c 'killall waybar; waybar &'
bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

# Move focus with $mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with $mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with $mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, G, togglespecialworkspace, magic
bind = $mainMod SHIFT, G, movetoworkspace, special:magic

# Scroll through existing workspaces with $mainMod + scroll
bind = $mainMod, mouse_down, workspace, e-1
bind = $mainMod, mouse_up, workspace, e+1

# Move/resize windows with $mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, bash ~/.config/hypr/volume-brightness.sh volume_up
bindel = ,XF86AudioLowerVolume, exec, bash ~/.config/hypr/volume-brightness.sh volume_down
bindel = ,XF86AudioMute, exec, bash  ~/.config/hypr/volume-brightness.sh volume_mute
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, bash ~/.config/hypr/volume-brightness.sh brightness_up
bindel = ,XF86MonBrightnessDown, exec, bash ~/.config/hypr/volume-brightness.sh brightness_down

# Requires playerctl
bindl = , XF86AudioNext, exec, bash ~/.config/hypr/volume-brightness.sh next_media
bindl = , XF86AudioPause, exec, bash ~/.config/hypr/volume-brightness.sh play_pause
bindl = , XF86AudioPlay, exec, bash ~/.config/hypr/volume-brightness.sh play_pause
bindl = , XF86AudioPrev, exec, bash ~/.config/hypr/volume-brightness.sh next_media

# Screenshot
bind = ALT+SHIFT, S, exec, bash -c 'mkdir -p "$HOME/Pictures/Screenshots"; geometry=$(slurp -b 00000080 -c 00000000 -s 00000000 | tr -d "\n"); filename="Screenshot From $(date +"%Y-%m-%d %H-%M-%S").png"; filepath="$HOME/Pictures/Screenshots/$filename"; grim -g "$geometry" "$filepath" && wl-copy < "$filepath" && notify-send -i camera-photo "Screenshot" "The screenshot has been saved and copied to the clipboard."'

#########################
# WINDOWS AND WORKSPACES#
#########################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules
windowrule = suppressevent maximize, class:.*
windowrule = nofocus, class:^$, title:^$, xwayland:1, floating:1 fullscreen:0, pinned:0

# Custom window rules
windowrule = noblur, class:^()$, title:^()$
windowrule = float, class:lxqt-policykit-agent
windowrule = dimaround, class:lxqt-policykit-agent
windowrule = float, class:Rofi
windowrule = dimaround, class:Rofi
windowrule = opacity 0.999999, class:zen # Fix Zen Browser transparency bug (if applicable)
